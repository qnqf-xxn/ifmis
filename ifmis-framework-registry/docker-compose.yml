version: "2"
services:
 peer1: # 默认情况下，其他服务可以使用服务名称连接到该服务。因此，对于peer2的节点，它需要连接http://${REGISTRY_SERVER1:127.0.0.1}:${REGISTRY_SERVER1_PORT:8761}/eureka/，因此需要配置该服务的名称是peer1。
  image: cloud/ifmis-framework-registry:1.0.0-SNAPSHOT
  networks:
   - eureka-net
  ports:
   - "8761:8761"
  environment:
   - spring.profiles.active=peer1
 peer2:
  image: cloud/ifmis-framework-registry:1.0.0-SNAPSHOT
  hostname: peer2
  networks:
   - eureka-net
  ports:
   - "8762:8762"
  environment:
   - spring.profiles.active=peer2
networks:
 eureka-net:
  driver: bridge
#docker network create eureka-net