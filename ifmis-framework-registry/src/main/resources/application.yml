#https://www.cnblogs.com/jinjiyese153/p/8617951.html SpringCloud系列六：Eureka的自我保护模式、IP选择、健康检查
---
server:
  port: 8761
spring:
  profiles: dev
  autoconfigure:
    exclude: 
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
eureka:
  server:
    #eureka server缓存readWriteCacheMap失效时间，这个只有在这个时间过去后缓存才会失效，失效前不会更新，过期后从registry重新读取注册服务信息，registry是一个ConcurrentHashMap。
    #由于启用了evict其实就用不太上改这个配置了
    #默认180s
    responseCacheAutoExpirationInSeconds: 180
    #eureka server刷新readCacheMap的时间，注意，client读取的是readCacheMap，这个时间决定了多久会把readWriteCacheMap的缓存更新到readCacheMap上
    #默认30s
    responseCacheUpdateIntervalMs: 3000
    peer-node-read-timeout-ms: 200000
    enable-self-preservation: false # 设为false，关闭自我保护
    eviction-interval-time-in-ms: 10000 # 清理间隔（单位毫秒，默认是60*1000）启用主动失效，并且每次主动失效检测间隔为10s
  instance:
    hostname: localhost
    prefer-ip-address: false
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health
  client:
    register-with-eureka: false
    fetch-registry: false
    prefer-same-zone-eureka: true
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${REGISTRY_SERVER1:127.0.0.1}:${REGISTRY_SERVER1_PORT:8761}/eureka/
---
server:
  port: 8761
spring:
  profiles: peer1
  autoconfigure:
    exclude: 
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
eureka:
  server:
    enable-self-preservation: false
    eviction-interval-time-in-ms: 10000
    peer-node-read-timeout-ms: 200000
    responseCacheAutoExpirationInSeconds: 180
    responseCacheUpdateIntervalMs: 3000
  instance:
    hostname: peer1
    prefer-ip-address: false
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health
  client:
    register-with-eureka: true
    fetch-registry: true
    prefer-same-zone-eureka: true
    #地区
    region: beijing
    availability-zones:
      beijing: zone-1,zone-2
    service-url:
      zone-1: http://${spring.security.user.name}:${spring.security.user.password}@${REGISTRY_SERVER1:127.0.0.1}:${REGISTRY_SERVER1_PORT:8761}/eureka/
      zone-2: http://${spring.security.user.name}:${spring.security.user.password}@${REGISTRY_SERVER2:127.0.0.1}:${REGISTRY_SERVER2_PORT:8762}/eureka/
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${REGISTRY_SERVER2:127.0.0.1}:${REGISTRY_SERVER2_PORT:8762}/eureka/
