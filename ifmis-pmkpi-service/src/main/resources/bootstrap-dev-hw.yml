spring:
  cloud:
    config:
      enabled: false
      name: fasp2datasource${ifmis.config.file:},common,common-redis${ifmis.config.file:},${spring.application.name}${ifmis.config.file:},environment
      uri: http://${CONFIG_SERVER:config}:${CONFIG_SERVER_PORT:8880}
      username: ${CONFIG_SERVER_USERNAME:user}
      password: ${CONFIG_SERVER_PASSWORD:password}
    servicecomb:
      # 微服务的基本信息
      service:
        # 微服务名称，和spring.application.name保持一致。
        name: ${spring.application.name}
        # 微服务版本号，本示例使用ServiceStage环境变量。建议保留这种配置方式，部署的时候，不用手工修改版本号，防止契约注册失败。
        # 注意：如果配置文件没有CAS_INSTANCE_VERSION环境变量，SDK框架升级、契约改变的时候，手动更改版本号，否则无法更新。
        version: ${CAS_INSTANCE_VERSION:1.0.0}
        # 应用名称。默认情况下只有应用名称相同的微服务之间才可以相互发现。
        application: ifmis-spring-cloud
        # 环境名称。只有环境名称相同的微服务之间才可以相互发现。
        # 可以取值 development, testing, acceptance, production
        environment: production
      # 注册发现相关配置
      discovery:
        # 注册中心地址，本示例使用ServiceStage环境变量。建议保留这种配置方式，
        # 部署的时候，不用手工修改地址。
        address: ${SERVICECOMB_ADDRESS:http://127.0.0.1:30100}
        # 微服务向CSE发送心跳间隔时间，单位秒
        # 注意：注册中心对服务实例健康检查间隔时间最小5秒，SDK设置小于5秒时，以5秒作为检测时间
        healthCheckInterval: 15
        # 拉取实例的轮询时间，单位毫秒
        pollInterval: 15000
        # 优雅停机设置。优雅停机后，先从注册中心注销自己。这个时间表示注销自己后等待的时间，这个时间后才退出。
        waitTimeForShutDownInMillis: 5000
      config:
        enabled: ${SERVICECOMB_KIE_ENABLED:false}
        # 配置中心地址，本示例使用ServiceStage环境变量。建议保留这种配置方式，
        # 部署的时候，不用手工修改地址。
        serverAddr: ${SERVICECOMB_KIE_ADDRESS:http://127.0.0.1:30110}
        serverType: kie
        # 自定义配置
        #kie:
        #  customLabel: ${spring.application.name}
        #  customLabelValue: ${INSTANCE_TAG:default}
        # 自定义配置，使用文本的key/value配置项作为yaml格式配置
        fileSource: fasp2datasource${ifmis.config.file:}.yml,common.yml,common_redis${ifmis.config.file:}.yml,${spring.application.name}${ifmis.config.file:}.yml,environment.yml,ifmis_pmkpi_service${ifmis.config.file:}.yml
      dashboard:
        # 仪表盘配置，本地开发默认不开启
        enabled: false
        address: ${PAAS_CSE_DS_ENDPOINT:http://127.0.0.1:30103}
eureka:
  client:
    enabled: false
    register-with-eureka: false